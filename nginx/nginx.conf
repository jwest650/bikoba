worker_processes auto;
worker_rlimit_nofile 8192;

events {
  worker_connections 1024;
  multi_accept on;
}

http {
  include       /etc/nginx/mime.types;
  default_type  application/octet-stream;

  sendfile        on;
  tcp_nopush      on;
  tcp_nodelay     on;
  keepalive_timeout 65;
  types_hash_max_size 2048;
  server_tokens off;
  client_body_timeout 30s;
  client_header_timeout 30s;
  send_timeout 30s;

  # ── Logging ───────────────────────────────────────────────────────────────
  log_format main '$remote_addr - $remote_user [$time_local] '
                  '"$request" $status $body_bytes_sent '
                  '"$http_referer" "$http_user_agent" '
                  '"$http_x_forwarded_for"';
  access_log /var/log/nginx/access.log main;
  error_log  /var/log/nginx/error.log warn;

  # ── Compression ───────────────────────────────────────────────────────────
  gzip on;
  gzip_vary on;
  gzip_proxied any;
  gzip_comp_level 6;
  gzip_min_length 1024;
  gzip_types
    text/plain
    text/css
    text/javascript
    application/javascript
    application/json
    application/xml
    application/xml+rss
    image/svg+xml;

  # ── Upstream ──────────────────────────────────────────────────────────────
  upstream bikoba {
    server bikoba:3000;
    keepalive 32;
  }

  # ── Public server ─────────────────────────────────────────────────────────
  server {
    listen 80 default_server;
    listen [::]:80 default_server;
    server_name _;

    # Match MAX_UPLOAD_BYTES on the app side (default 8 MiB) with a little headroom.
    client_max_body_size 10m;

    # Forwarded headers — `trust proxy: 1` in main.ts honours these so
    # req.ip / req.protocol resolve to the real client values.
    proxy_set_header Host              $host;
    proxy_set_header X-Real-IP         $remote_addr;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Forwarded-Host  $host;
    proxy_http_version 1.1;
    proxy_set_header Connection        "";

    # Reasonable upstream timeouts. Bumped for webhook bodies + uploads.
    proxy_connect_timeout 5s;
    proxy_send_timeout    60s;
    proxy_read_timeout    60s;

    # Stream upload bodies through instead of buffering the whole 8 MiB
    # in nginx before forwarding. Better latency under load.
    proxy_request_buffering off;

    # Forward everything to the NestJS app.
    location / {
      proxy_pass http://bikoba;
    }

    # Health endpoint for ops / load balancers. Doesn't hit the app.
    location = /nginx-health {
      access_log off;
      return 200 "ok\n";
      add_header Content-Type text/plain;
    }
  }

  # ── TLS server template ───────────────────────────────────────────────────
  # If you're terminating TLS at the origin (cert-manager / certbot / similar):
  # mount the cert files into /etc/nginx/certs and enable this block.
  #
  # server {
  #   listen 443 ssl http2;
  #   listen [::]:443 ssl http2;
  #   server_name api.bikoba.com;
  #
  #   ssl_certificate     /etc/nginx/certs/fullchain.pem;
  #   ssl_certificate_key /etc/nginx/certs/privkey.pem;
  #   ssl_protocols       TLSv1.2 TLSv1.3;
  #   ssl_ciphers         HIGH:!aNULL:!MD5;
  #   ssl_prefer_server_ciphers on;
  #
  #   add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
  #
  #   client_max_body_size 10m;
  #   proxy_request_buffering off;
  #
  #   proxy_set_header Host              $host;
  #   proxy_set_header X-Real-IP         $remote_addr;
  #   proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
  #   proxy_set_header X-Forwarded-Proto $scheme;
  #
  #   location / {
  #     proxy_pass http://bikoba;
  #   }
  # }
  #
  # If you terminate TLS at Cloudflare (proxied DNS) you can stay HTTP-only
  # here. Use Cloudflare's "Full" or "Full (strict)" origin TLS mode for
  # end-to-end encryption.
}
